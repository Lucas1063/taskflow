# k8s/backend.yaml
apiVersion: apps/v1
kind: Deployment
metadata: { name: backend, namespace: taskflow }
spec:
  replicas: 2
  selector: { matchLabels: { app: backend } }
  template:
    metadata: { labels: { app: backend } }
    spec:
      containers:
        - name: backend
          image: lucasw1063/taskflow-backend:1.0
          ports: [{ containerPort: 3000 }]
          envFrom:
            - secretRef: { name: taskflow-config }
          resources:
            requests: { cpu: '100m', memory: '128Mi' }  # precisa p/ o autoscaling de pods
            limits:   { cpu: '300m', memory: '256Mi' }
          readinessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: backend, namespace: taskflow }
spec:
  selector: { app: backend }
  ports: [{ port: 3000, targetPort: 3000 }]   # ClusterIP: so por dentro (isolado)
