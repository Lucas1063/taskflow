# k8s/frontend.yaml
apiVersion: apps/v1
kind: Deployment
metadata: { name: frontend, namespace: taskflow }
spec:
  replicas: 2
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
        - name: frontend
          image: lucasw1063/taskflow-frontend:1.2
          imagePullPolicy: Always
          ports: [{ containerPort: 80 }]
          resources:
            requests: { cpu: '50m', memory: '64Mi' }
            limits:   { cpu: '150m', memory: '128Mi' }
---
apiVersion: v1
kind: Service
metadata: { name: frontend, namespace: taskflow }
spec:
  type: NodePort
  selector: { app: frontend }
  ports: [{ port: 80, targetPort: 80, nodePort: 30080 }]
